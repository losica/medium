@if (currentUser()) {
    <div class="min-h-screen bg-gray-50 py-10 px-4">
        <div class="max-w-xl mx-auto">

            <div class="mb-8 text-center">
                <h1 class="text-3xl font-semibold text-gray-900">Settings</h1>
                <p class="text-sm text-gray-500 mt-1">Manage your account preferences</p>
            </div>

            @if (validationErrors(); as errors) {
                <div class="mb-6">
                    <error-messages [errors]="errors"></error-messages>
                </div>
            }

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
                <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Profile picture URL</label>
                        <input
                            type="text"
                            formControlName="image"
                            placeholder="https://example.com/photo.jpg"
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                        />
                    </div>

                   <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            Username<span class="text-red-500">*</span>
                        </label>
                        <input
                            type="text"
                            formControlName="username"
                            placeholder="Your username"
                            class="w-full px-4 py-2.5 rounded-lg border text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                            [class.border-red-400]="usernameInvalid"
                            [class.border-gray-300]="!usernameInvalid"
                        />
                        @if (usernameInvalid) {
                            <p class="mt-1 text-xs text-red-500">Username is required</p>
                        }
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Short bio</label>
                        <textarea
                            formControlName="bio"
                            rows="5"
                            placeholder="Tell us a little about yourself..."
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition resize-none"
                        ></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                        <input
                            type="email"
                            formControlName="email"
                            placeholder="you@example.com"
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-400 bg-gray-100 placeholder-gray-400 focus:outline-none cursor-not-allowed transition"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">New password</label>
                        <input
                            type="password"
                            formControlName="password"
                            placeholder="Leave blank to keep current password"
                            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                        />
                    </div>

                    <div class="flex justify-end pt-2">
                        <button
                            type="submit"
                            [disabled]="form.invalid || isSubmitting()"
                            class="px-6 py-2.5 bg-blue-ribbon-faded !text-white text-sm font-medium rounded-lg hover:bg-blue-ribbon disabled:opacity-50 disabled:cursor-not-allowed transition"
                        >
                            {{ isSubmitting() ? 'Saving...' : 'Update settings' }}
                        </button>
                    </div>

                </form>
            </div>

            <div class="mt-6">
                <button
                    (click)="logout()"
                    class="px-4 py-2 text-sm font-medium !text-white border bg-red-400 rounded-lg hover:bg-red-500  transition"
                >
                    Logout
                </button>
            </div>

        </div>
    </div>
}
