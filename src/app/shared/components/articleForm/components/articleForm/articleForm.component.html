<div class="min-h-screen bg-gray-50 py-10 px-4">
    <div class="max-w-3xl mx-auto">

        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold text-gray-900">New Article</h1>
            <p class="text-sm text-gray-500 mt-1">Share your thoughts with the world</p>
        </div>

        @if (errors(); as errors) {
            <div class="mb-6">
                <error-messages [errors]="errors"></error-messages>
            </div>
        }

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Article title <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        formControlName="title"
                        placeholder="Article title"
                        class="w-full px-4 py-2.5 rounded-lg border text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                        [class.border-red-400]="titleInvalid"
                        [class.border-gray-300]="!titleInvalid"
                    />
                    @if (titleInvalid) {
                        <p class="mt-1 text-xs text-red-500">Title is required</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Description <span class="text-red-500">*</span>
                    </label>
                    <input
                        type="text"
                        formControlName="description"
                        placeholder="What is this article about?"
                        class="w-full px-4 py-2.5 rounded-lg border text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                        [class.border-red-400]="descriptionInvalid"
                        [class.border-gray-300]="!descriptionInvalid"
                    />
                    @if (descriptionInvalid) {
                        <p class="mt-1 text-xs text-red-500">Description is required</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Content <span class="text-red-500">*</span>
                    </label>
                    <textarea
                        formControlName="body"
                        rows="8"
                        placeholder="Write your article (in markdown)"
                        class="w-full px-4 py-2.5 rounded-lg border text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition resize-none"
                        [class.border-red-400]="bodyInvalid"
                        [class.border-gray-300]="!bodyInvalid"
                    ></textarea>
                    @if (bodyInvalid) {
                        <p class="mt-1 text-xs text-red-500">Content is required</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Tags
                        <span class="text-gray-400 font-normal">(space separated)</span>
                    </label>
                    <input
                        type="text"
                        formControlName="tagList"
                        placeholder="angular ngrx typescript"
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition"
                    />
                </div>

                <div class="flex justify-end pt-2">
                    <button
                        type="submit"
                        [disabled]="form.invalid || isSubmitting()"
                        class="px-6 py-2.5 bg-blue-ribbon-faded !text-white text-sm font-medium rounded-lg hover:bg-blue-ribbon disabled:opacity-50 disabled:cursor-not-allowed transition"
                    >
                        {{ isSubmitting() ? 'Publishing...' : 'Publish article' }}
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>
