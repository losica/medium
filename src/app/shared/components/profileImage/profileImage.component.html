@if (profileImage() && !imageError()) {
    <img  
        [class]="'inline-block rounded-full object-cover align-middle ' + customClasses()" 
        [src]="profileImage()" 
        alt="Profile image" 
        (error)="imageError.set(true)"
        [style.width.px]="size()"
        [style.height.px]="size()"
    />
} @else {
    <div class="inline-block items-center justify-center">
        <div  [class]="'items-center justify-center rounded-full bg-black/30 text-white align-middle' + customClasses()" 
            [class]="customClasses()"
            [style.font-size.px]="size() * 0.5"
        >
            <i class="ion-person text-gray-03 p-3"
                [style.width.px]="size()"
                [style.height.px]="size()"
            ></i>
        </div>
    </div>
}
