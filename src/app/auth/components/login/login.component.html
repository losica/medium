<div class="min-h-screen bg-gray-50 py-10 px-4">
    <div class="max-w-xl mx-auto">
        
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-semibold text-gray-900">Login</h1>
            <p class="text-m text-gray-500 mt-1">
                <a routerLink="/register">Need an account?</a>
            </p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
            @if (validationErrors(); as errors) {
                <div class="mb-6">
                    <error-messages [errors]="errors"></error-messages>
                </div>
            }
            <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input 
                        type="email" 
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition" 
                        [class.border-red-400]="emailInvalid"
                        [class.border-gray-300]="!emailInvalid"
                        placeholder="you@example.com" 
                        formControlName="email"
                    >
                    @if (emailInvalid) {
                        <p class="mt-1 text-xs text-red-500">Valid email is required</p>
                    }
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input 
                        type="password" 
                        class="w-full px-4 py-2.5 rounded-lg border text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-1 focus:ring-blue-ribbon-faded focus:border-transparent transition" 
                        [class.border-red-400]="passwordInvalid"
                        [class.border-gray-300]="!passwordInvalid"
                        placeholder="Password" 
                        formControlName="password"
                    >
                    @if (passwordInvalid) {
                        <p class="mt-1 text-xs text-red-500">Password is required</p>
                    }
                </div>
                <div class="pt-2">
                    <button 
                        type="submit" 
                        class="w-full px-6 py-2.5 bg-blue-ribbon-faded !text-white text-sm font-medium rounded-lg hover:bg-blue-ribbon disabled:opacity-50 disabled:cursor-not-allowed transition" 
                        [disabled]="form.invalid || isSubmitting()"
                    >
                        Sign in
                    </button>
                </div>
            </form>
        </div>
        
    </div>

</div>
